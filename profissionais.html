<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profissionais</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- BOTÃO VOLTAR -->
<div class="btn-voltar" onclick="history.back()">
←
</div>

<section class="pagina-servicos">

<h1 id="titulo-servico">Profissionais disponíveis</h1>

<div id="lista-profissionais" class="profissionais-grid"></div>

</section>

<script>

const servico = localStorage.getItem("servicoSelecionado")

const titulo = document.getElementById("titulo-servico")
titulo.innerText = servico + " disponíveis"

const dados = {
Pedreiro: [
{nome:"Carlos Silva", avaliacao:"4.8", img:"https://i.pravatar.cc/150?img=1"},
{nome:"João Pedro", avaliacao:"4.5", img:"https://i.pravatar.cc/150?img=2"}
],

Encanador: [
{nome:"Marcos Lima", avaliacao:"4.7", img:"https://i.pravatar.cc/150?img=3"}
],

Jardineiro: [
{nome:"José Verde", avaliacao:"4.9", img:"https://i.pravatar.cc/150?img=4"}
],

Eletricista: [
{nome:"Lucas Souza", avaliacao:"4.6", img:"https://i.pravatar.cc/150?img=5"}
],

Diarista: [
{nome:"Ana Clara", avaliacao:"4.9", img:"https://i.pravatar.cc/150?img=6"}
],

Pintor: [
{nome:"Rafael Gomes", avaliacao:"4.4", img:"https://i.pravatar.cc/150?img=7"}
]
}

const container = document.getElementById("lista-profissionais")

function render(){

container.innerHTML = ""

const lista = dados[servico] || []

lista.forEach(p => {

container.innerHTML += `
<div class="prof-card" onclick="abrirPerfil('${p.nome}', '${p.avaliacao}', '${p.img}')">

<img src="${p.img}">
<h3>${p.nome}</h3>
<p>${servico}</p>
<p>⭐ ${p.avaliacao}</p>

</div>
`

})

}

function abrirPerfil(nome, avaliacao, img){

document.getElementById("perfil").style.display = "flex"

document.getElementById("perfil-conteudo").innerHTML = `
<img src="${img}">
<h2>${nome}</h2>
<p>${servico}</p>
<p>⭐ ${avaliacao}</p>

<button class="btn-amarelo" onclick="contratar('${nome}','${avaliacao}')">
Contratar
</button>

<button class="btn-secundario" onclick="alert('Abrindo chat...')">
Feedback
</button>

<button class="btn-cancelar" onclick="cancelarServico('${nome}')">
Cancelar serviço
</button>
`
}

function fecharPerfil(){
document.getElementById("perfil").style.display = "none"
}

function contratar(nome, avaliacao){

let lista = JSON.parse(localStorage.getItem("servicos")) || []

lista.push({
nome: servico,
profissional: nome,
avaliacao: avaliacao
})

localStorage.setItem("servicos", JSON.stringify(lista))

alert("Serviço contratado!")
fecharPerfil()
}

function cancelarServico(nome){

let lista = JSON.parse(localStorage.getItem("servicos")) || []

lista = lista.filter(s => s.profissional !== nome)

localStorage.setItem("servicos", JSON.stringify(lista))

alert("Serviço cancelado!")
fecharPerfil()
}

render()

</script>

<div id="perfil" class="perfil">
<div class="perfil-box">

<span class="fechar" onclick="fecharPerfil()">✖</span>

<div id="perfil-conteudo"></div>

</div>
</div>

</body>
</html>
