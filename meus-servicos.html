<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meus Serviços</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- BOTÃO VOLTAR -->
<div class="btn-voltar" onclick="history.back()">
← Voltar
</div>

<section class="pagina-servicos">

<h1>Meus serviços</h1>

<p class="subtitulo">
Acompanhe os serviços que você contratou
</p>

<div id="lista-servicos" class="lista-servicos"></div>

</section>

<script>

let lista = JSON.parse(localStorage.getItem("servicos")) || []

const container = document.getElementById("lista-servicos")

function renderizar(){

container.innerHTML = ""

if(lista.length === 0){
container.innerHTML = "<p>Nenhum serviço contratado ainda</p>"
return
}

lista.forEach((servico, index) => {

container.innerHTML += `
<div class="servico-item">
<h3>${servico.nome}</h3>
<p>Profissional: ${servico.profissional}</p>
<p>⭐ ${servico.avaliacao}</p>

<button onclick="cancelar(${index})" class="btn-cancelar">
Cancelar serviço
</button>
</div>
`

})

}

function cancelar(index){
lista.splice(index, 1)
localStorage.setItem("servicos", JSON.stringify(lista))
renderizar()
}

renderizar()

</script>

</body>
</html>
