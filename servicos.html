<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serviços</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="btn-voltar" onclick="history.back()">
⬅ Voltar
</div>

<!-- CONTEÚDO -->
<section class="pagina-servicos">

<h1>Escolha um serviço</h1>

<p class="subtitulo">
Selecione o tipo de profissional que você precisa
</p>

<div class="servico-card" onclick="abrirProfissionais('Pedreiro')">
<img src="img/pedreiro.png">
<p>Pedreiro</p>
</div>

<div class="servico-card" onclick="abrirProfissionais('Encanador')">
<img src="img/encanador.png">
<p>Encanador</p>
</div>

<div class="servico-card" onclick="abrirProfissionais('Jardineiro')">
<img src="img/jardineiro.png">
<p>Jardineiro</p>
</div>

<div class="servico-card" onclick="abrirProfissionais('Eletricista')">
<img src="img/eletricista.png">
<p>Eletricista</p>
</div>

<div class="servico-card" onclick="abrirProfissionais('Diarista')">
<img src="img/diarista.png">
<p>Diarista</p>
</div>

<div class="servico-card" onclick="abrirProfissionais('Pintor')">
<img src="img/pintor.png">
<p>Pintor</p>
</div>

</section>

<script>
function abrirProfissionais(servico){
localStorage.setItem("servicoSelecionado", servico)
window.location.href = "profissionais.html"
}
</script>

</body>
</html>
